apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: cont-1
          image: sukumar722/php:app-image

          ports:
            - containerPort: 80

          # ConfigMap integration
          envFrom:
            - configMapRef:
                name: configmap

          # Resource requests and limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"

          # Liveness Probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10

          # Readiness Probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
